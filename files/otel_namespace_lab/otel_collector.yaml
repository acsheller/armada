apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: otel-lab
data:
  collector-config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: fake-metrics-app
              scrape_interval: 5s
              static_configs:
                - targets: ["fake-metrics-app.swinglines.svc.cluster.local:8080"]
    processors:
      batch: {}
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: otel-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: otel-lab
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.106.1
          args: ["--config=/conf/collector-config.yaml"]
          ports:
            - containerPort: 8888
              name: metrics
            - containerPort: 8889
              name: promexp
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
            items:
              - key: collector-config.yaml
                path: collector-config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: otel-lab
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: metrics
      port: 8888
      targetPort: metrics
    - name: promexp
      port: 8889
      targetPort: promexp
