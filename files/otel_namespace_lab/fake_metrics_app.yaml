apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-metrics-app
  namespace: swinglines
  labels:
    app.kubernetes.io/name: fake-metrics-app
    app.kubernetes.io/part-of: otel-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fake-metrics-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fake-metrics-app
        app.kubernetes.io/part-of: otel-lab
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: fake-metrics-app
  namespace: swinglines
  labels:
    app.kubernetes.io/name: fake-metrics-app
    app.kubernetes.io/part-of: otel-lab
spec:
  selector:
    app.kubernetes.io/name: fake-metrics-app
  ports:
    - name: http
      port: 8080
      targetPort: http
