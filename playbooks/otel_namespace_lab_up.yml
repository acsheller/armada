---
- name: Create OTel namespace lab
  hosts: targets
  become: false
  gather_facts: false
  vars_files:
    - ../group_vars/all/otel_namespace_lab.yml

  tasks:
    - name: Ensure each OTel lab namespace exists
      ansible.builtin.command: kubectl create namespace {{ item.name }}
      loop: "{{ otel_lab_namespaces }}"
      register: namespace_create
      changed_when: namespace_create.rc == 0
      failed_when: namespace_create.rc != 0 and ('AlreadyExists' not in (namespace_create.stderr | default('')))

    - name: Apply labels to each namespace
      ansible.builtin.command: >-
        kubectl label namespace {{ item.name }}
        {% for k, v in item.labels.items() %}{{ k }}={{ v }} {% endfor %}
        --overwrite
      loop: "{{ otel_lab_namespaces }}"
      changed_when: true

    - name: Apply annotations to each namespace
      ansible.builtin.command: >-
        kubectl annotate namespace {{ item.name }}
        {% for k, v in item.annotations.items() %}{{ k }}={{ v }} {% endfor %}
        --overwrite
      loop: "{{ otel_lab_namespaces }}"
      changed_when: true

    - name: Apply OTel baseline manifests
      ansible.builtin.command: kubectl apply -f {{ item }}
      loop: "{{ otel_lab_manifests }}"
      register: manifest_apply
      changed_when: "'created' in stdout or 'configured' in stdout"

    - name: Wait for fake metrics app deployment to be ready
      ansible.builtin.command: kubectl rollout status deployment/fake-metrics-app -n swinglines --timeout=120s
      changed_when: false

    - name: Wait for collector deployment to be ready
      ansible.builtin.command: kubectl rollout status deployment/otel-collector -n observability --timeout=120s
      changed_when: false

    - name: Wait for prometheus deployment to be ready
      ansible.builtin.command: kubectl rollout status deployment/prometheus -n observability --timeout=120s
      changed_when: false

    - name: Show created namespaces
      ansible.builtin.command: kubectl get namespaces -l app.kubernetes.io/part-of=otel-lab
      register: otel_namespaces
      changed_when: false

    - name: Show deployed workloads
      ansible.builtin.command: kubectl get deploy -n swinglines && kubectl get deploy -n observability
      register: otel_workloads
      changed_when: false

    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "Namespaces: {{ otel_namespaces.stdout_lines }}"
          - "Workloads: {{ otel_workloads.stdout_lines }}"
