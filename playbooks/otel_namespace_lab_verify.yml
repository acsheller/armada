---
- name: Verify OTel namespace lab baseline
  hosts: targets
  become: false
  gather_facts: false

  tasks:
    - name: Verify fake metrics app /metrics endpoint
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - --raw
          - /api/v1/namespaces/swinglines/services/http:fake-metrics-app:8080/proxy/metrics
      register: fake_metrics
      changed_when: false
      failed_when: "'fake_requests_total' not in fake_metrics.stdout"

    - name: Verify collector /metrics endpoint
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - --raw
          - /api/v1/namespaces/observability/services/http:otel-collector:8889/proxy/metrics
      register: collector_metrics
      changed_when: false

    - name: Verify Prometheus query output
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - --raw
          - /api/v1/namespaces/observability/services/http:prometheus:9090/proxy/api/v1/query?query=fake_requests_total
      register: prometheus_query
      changed_when: false

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "Fake app metrics endpoint reachable"
          - "Collector metrics endpoint reachable"
          - "Prometheus query endpoint returned success"
