---
- name: Verify OTel namespace lab baseline
  hosts: targets
  become: false
  gather_facts: false

  tasks:
    - name: Verify fake metrics app /metrics endpoint
      ansible.builtin.command: >-
        kubectl get --raw
        /api/v1/namespaces/swinglines/services/fake-metrics-app:8080/proxy/metrics
      register: fake_app_metrics
      changed_when: false
      failed_when: fake_app_metrics.rc != 0 or ('go_gc_duration_seconds' not in fake_app_metrics.stdout)

    - name: Verify collector /metrics endpoint
      ansible.builtin.command: >-
        kubectl get --raw
        /api/v1/namespaces/observability/services/otel-collector:8888/proxy/metrics
      register: collector_metrics
      changed_when: false
      failed_when: collector_metrics.rc != 0 or ('otelcol_process_uptime' not in collector_metrics.stdout)

    - name: Verify Prometheus query API output
      ansible.builtin.command: >-
        kubectl get --raw
        /api/v1/namespaces/observability/services/prometheus:9090/proxy/api/v1/query?query=up
      register: prometheus_query
      changed_when: false
      failed_when: prometheus_query.rc != 0 or ('"status":"success"' not in prometheus_query.stdout)

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "Fake app metrics endpoint reachable"
          - "Collector metrics endpoint reachable"
          - "Prometheus query endpoint returned success"
